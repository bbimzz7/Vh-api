<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VertictHub — Get Key</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #04040a;
    --card:    #090912;
    --border:  rgba(120,120,255,0.15);
    --accent:  #6060ff;
    --glow:    rgba(96,96,255,0.35);
    --text:    #c8c8ee;
    --muted:   #4a4a6a;
    --green:   #3dffaa;
    --red:     #ff5566;
    --mono:    'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(96,96,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,96,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(60,60,160,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes gridDrift {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(48px, 48px); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(60,60,180,0.12);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Glow corner accent */
  .card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(96,96,255,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
    box-shadow: 0 0 20px var(--glow);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px var(--glow); }
    50%       { box-shadow: 0 0 40px var(--glow); }
  }

  .header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent); }

  .header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* Steps */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.3s;
  }

  .step.done {
    border-color: rgba(61,255,170,0.3);
    background: rgba(61,255,170,0.04);
    color: var(--green);
  }

  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(96,96,255,0.15);
    border: 1px solid rgba(96,96,255,0.3);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
  }

  .step.done .step-num {
    background: rgba(61,255,170,0.1);
    border-color: rgba(61,255,170,0.4);
    color: var(--green);
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    text-align: center;
    letter-spacing: 0.2px;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-link {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(96,96,255,0.35);
    margin-top: 0;
  }

  .btn-link:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(96,96,255,0.5);
  }

  .btn-get {
    background: rgba(61,255,170,0.08);
    color: var(--green);
    border: 1px solid rgba(61,255,170,0.3);
    margin-top: 8px;
    display: none;
  }

  .btn-get:hover:not(:disabled) {
    background: rgba(61,255,170,0.14);
  }

  /* Key result box */
  .key-result {
    display: none;
    margin-top: 20px;
    padding: 16px;
    background: rgba(61,255,170,0.04);
    border: 1px solid rgba(61,255,170,0.25);
    border-radius: 12px;
    text-align: center;
    animation: fadeUp 0.4s ease both;
  }

  .key-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .key-text {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
    word-break: break-all;
    margin-bottom: 6px;
  }

  .key-expires {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 12px;
  }

  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    background: rgba(61,255,170,0.08);
    border: 1px solid rgba(61,255,170,0.3);
    border-radius: 8px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copy:hover { background: rgba(61,255,170,0.15); }

  /* Status */
  .status {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-align: center;
    margin-top: 14px;
    min-height: 16px;
    transition: color 0.2s;
  }

  .status.err { color: var(--red); }
  .status.ok  { color: var(--green); }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="header">
      <div class="logo-ring">⚡</div>
      <h1>Vertic<span>Hub</span></h1>
      <p>// key system v2</p>
    </div>

    <div class="steps" id="steps">
      <div class="step" id="step1">
        <div class="step-num">1</div>
        <span>Klik tombol dan selesaikan verifikasi</span>
      </div>
      <div class="step" id="step2">
        <div class="step-num">2</div>
        <span>Kembali ke halaman ini</span>
      </div>
      <div class="step" id="step3">
        <div class="step-num">3</div>
        <span>Klik "Ambil Key" dan salin key-mu</span>
      </div>
    </div>

    <hr class="divider">

    <a id="btnLink" class="btn btn-link" href="#" target="_blank">
      🔗 Buka Verifikasi Linkvertise
    </a>
    <button id="btnGet" class="btn btn-get" onclick="getKey()">
      ✅ Ambil Key
    </button>

    <div id="keyResult" class="key-result">
      <div class="key-label">— Key Aktif —</div>
      <div id="keyText" class="key-text"></div>
      <div id="keyExpires" class="key-expires"></div>
      <button class="btn-copy" id="copyBtn" onclick="copyKey()">
        <span>📋</span> Salin Key
      </button>
    </div>

    <div id="status" class="status"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const hwid   = params.get("hwid") || "";

  // ⚠️ Ganti USER_ID dengan ID Linkvertise kamu
  const LINKVERTISE_URL = `https://linkvertise.com/USER_ID/vertichub-key?o=sharing`;
  const API_BASE        = location.origin;

  const btnLink  = document.getElementById("btnLink");
  const btnGet   = document.getElementById("btnGet");
  const keyResult = document.getElementById("keyResult");
  const status   = document.getElementById("status");

  // Set link + append hwid ke redirect
  btnLink.href = LINKVERTISE_URL;

  if (!hwid) {
    setStatus("⚠️ HWID tidak ditemukan — buka link dari dalam script!", "err");
    btnLink.style.opacity = "0.4";
    btnLink.style.pointerEvents = "none";
  }

  function setStatus(msg, type = "") {
    status.textContent = msg;
    status.className   = "status " + type;
  }

  function markStep(n) {
    document.getElementById("step" + n).classList.add("done");
    document.getElementById("step" + n).querySelector(".step-num").textContent = "✓";
  }

  btnLink.addEventListener("click", function() {
    if (!hwid) return;
    setTimeout(() => {
      markStep(1);
      markStep(2);
      btnGet.style.display = "block";
      setStatus("Setelah verifikasi selesai → klik Ambil Key");
    }, 1500);
  });

  async function getKey() {
    if (!hwid) {
      setStatus("HWID tidak ditemukan. Buka link dari dalam script.", "err");
      return;
    }

    setStatus("Mengambil key...");
    btnGet.disabled = true;
    btnGet.textContent = "⏳ Memproses...";

    try {
      const res  = await fetch(`${API_BASE}/api/getkey?hwid=${encodeURIComponent(hwid)}`);
      const data = await res.json();

      if (data.key) {
        document.getElementById("keyText").textContent = data.key;
        const exp = new Date(data.expires);
        document.getElementById("keyExpires").textContent =
          `Berlaku hingga: ${exp.toLocaleString("id-ID")}`;

        keyResult.style.display = "block";
        markStep(3);
        setStatus(data.reused ? "✓ Key kamu masih aktif, digunakan kembali" : "✓ Key baru berhasil dibuat!", "ok");
        btnGet.style.display = "none";
      } else {
        setStatus(data.error || "Gagal mengambil key, coba lagi", "err");
        btnGet.disabled = false;
        btnGet.textContent = "✅ Ambil Key";
      }
    } catch (e) {
      setStatus("Koneksi error — periksa internet dan coba lagi", "err");
      btnGet.disabled = false;
      btnGet.textContent = "✅ Ambil Key";
    }
  }

  function copyKey() {
    const key = document.getElementById("keyText").textContent;
    navigator.clipboard.writeText(key).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.innerHTML = "<span>✓</span> Tersalin!";
      setTimeout(() => { btn.innerHTML = "<span>📋</span> Salin Key"; }, 2000);
    });
  }
</script>
</body>
</html>
