<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VertictHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #04040a; --card: #090912; --border: rgba(120,120,255,0.15);
    --accent: #6060ff; --glow: rgba(96,96,255,0.35); --text: #c8c8ee;
    --muted: #4a4a6a; --green: #3dffaa; --red: #ff5566;
    --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--display); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(96,96,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,96,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(60,60,160,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  @keyframes gridDrift { 0%{transform:translate(0,0)} 100%{transform:translate(48px,48px)} }

  /* ── PAGES ── */
  .page { display: none; position: relative; z-index: 1; width: 100%; padding: 20px; min-height: 100vh; align-items: center; justify-content: center; }
  .page.active { display: flex; }

  /* ── CARD ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 32px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 60px rgba(60,60,180,0.12);
    animation: fadeUp 0.5s ease both; width: 100%;
  }
  .card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(96,96,255,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 28px; }
  .logo-ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 24px;
    box-shadow: 0 0 20px var(--glow);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 20px var(--glow)} 50%{box-shadow:0 0 40px var(--glow)} }
  .header h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header p { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  /* ── BUTTONS ── */
  .btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px;
    border: none; font-family: var(--display); font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-decoration: none; text-align: center;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 20px rgba(96,96,255,0.35);
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(96,96,255,0.5); }
  .btn-ghost {
    background: rgba(255,255,255,0.03); color: var(--muted);
    border: 1px solid var(--border); margin-top: 8px; font-size: 12px;
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  /* ── KEY RESULT ── */
  .key-result {
    display: none; margin-top: 20px; padding: 16px;
    background: rgba(61,255,170,0.04); border: 1px solid rgba(61,255,170,0.25);
    border-radius: 12px; text-align: center;
    animation: fadeUp 0.4s ease both;
  }
  .key-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .key-text { font-family: var(--mono); font-size: 17px; font-weight: 700; color: var(--green); letter-spacing: 2px; word-break: break-all; margin-bottom: 6px; }
  .key-expires { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 12px; }
  .btn-copy {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; background: rgba(61,255,170,0.08);
    border: 1px solid rgba(61,255,170,0.3); border-radius: 8px;
    color: var(--green); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-copy:hover { background: rgba(61,255,170,0.15); }

  /* ── HWID BOX ── */
  .hwid-box {
    background: rgba(14,14,26,1); border: 1px solid rgba(50,50,90,1);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    word-break: break-all; line-height: 1.6;
  }
  .hwid-box span { color: var(--accent); }

  /* ── STATUS ── */
  .status { font-size: 11px; font-family: var(--mono); color: var(--muted); text-align: center; margin-top: 14px; min-height: 16px; }
  .status.err { color: var(--red); }
  .status.ok  { color: var(--green); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ── DASHBOARD ── */
  #pageDash .card { max-width: 900px; padding: 28px; }
  #loginBox { text-align: center; max-width: 340px; margin: 0 auto; }
  #loginBox h2 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  #loginBox p  { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-bottom: 24px; }
  .input-wrap { background: rgba(14,14,26,1); border: 1px solid rgba(50,50,90,1); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .input-wrap input { width: 100%; padding: 12px 14px; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 13px; }
  .input-wrap input::placeholder { color: var(--muted); }

  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
  @media(min-width:600px){ .stats-grid { grid-template-columns: repeat(4,1fr); } }
  .stat-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 800; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  .dash-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .dash-actions .btn { width: auto; padding: 10px 16px; font-size: 12px; flex: 1; min-width: 120px; }

  .key-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
  th { text-align: left; padding: 10px 12px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 400; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
  .badge-green { background: rgba(61,255,170,0.1); color: var(--green); border: 1px solid rgba(61,255,170,0.2); }
  .badge-red   { background: rgba(255,85,102,0.1);  color: var(--red);   border: 1px solid rgba(255,85,102,0.2); }
  .badge-muted { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
  .act-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 10px; padding: 3px 8px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; margin-right: 4px; }
  .act-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .act-btn.del:hover { color: var(--red); border-color: var(--red); }

  #pageGetkey .card { max-width: 440px; }

  /* ── ADMIN LINK ── */
  .admin-link {
    text-align: center; margin-top: 20px;
    font-size: 11px; font-family: var(--mono); color: var(--muted);
  }
  .admin-link a { color: var(--muted); text-decoration: none; border-bottom: 1px dashed var(--muted); transition: color 0.2s; }
  .admin-link a:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- ══════════════ PAGE: GETKEY ══════════════ -->
<div class="page" id="pageGetkey">
  <div style="width:100%;max-width:440px;padding:20px;position:relative;z-index:1">
    <div class="card">
      <div class="header">
        <div class="logo-ring">⚡</div>
        <h1>Vertic<span>Hub</span></h1>
        <p>// dapatkan key gratis kamu</p>
      </div>

      <!-- Info HWID -->
      <div class="hwid-box" id="hwidBox">
        HWID: <span id="hwidDisplay">Mendeteksi...</span>
      </div>

      <!-- Tombol Get Key -->
      <button class="btn btn-primary" id="btnGetKey" onclick="doGetKey()">
        ⚡ Ambil Key Sekarang
      </button>

      <!-- Hasil key -->
      <div id="keyResult" class="key-result">
        <div class="key-label">— Key Aktif —</div>
        <div id="keyText" class="key-text"></div>
        <div id="keyExpires" class="key-expires"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyKey()">
          <span>📋</span> Salin Key
        </button>
      </div>

      <div id="gk-status" class="status"></div>
    </div>

    <!-- Link ke admin -->
    <div class="admin-link">
      <a href="/dashboard">🔐 Login Admin</a>
    </div>
  </div>
</div>

<!-- ══════════════ PAGE: DASHBOARD ══════════════ -->
<div class="page" id="pageDash">
  <div style="width:100%;max-width:900px;padding:20px;position:relative;z-index:1">
    <div class="card">
      <!-- Login Box -->
      <div id="loginBox">
        <div class="logo-ring" style="margin-bottom:20px">⚡</div>
        <h2>Admin Dashboard</h2>
        <p>// vertichub key system</p>
        <div class="input-wrap">
          <input type="password" id="secretInput" placeholder="Masukkan admin secret..."
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">🔐 Login</button>
        <div id="login-status" class="status"></div>
        <div style="margin-top:16px">
          <a href="/" style="font-size:11px;font-family:var(--mono);color:var(--muted);text-decoration:none;border-bottom:1px dashed var(--muted)">← Kembali ke Get Key</a>
        </div>
      </div>

      <!-- Dashboard utama -->
      <div id="dashMain" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
          <div>
            <div style="font-size:18px;font-weight:800;color:#fff">Dashboard</div>
            <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">// key management</div>
          </div>
          <div style="display:flex;gap:8px">
            <a href="/" style="display:inline-block;padding:8px 14px;font-size:12px;border:1px solid var(--border);border-radius:10px;color:var(--muted);text-decoration:none;font-family:var(--mono)">← Get Key</a>
            <button class="btn btn-ghost" style="width:auto;padding:8px 14px;font-size:12px" onclick="doLogout()">Logout</button>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num" id="st-total">-</div><div class="stat-label">Total Key</div></div>
          <div class="stat-card"><div class="stat-num" id="st-active" style="color:var(--green)">-</div><div class="stat-label">Aktif</div></div>
          <div class="stat-card"><div class="stat-num" id="st-expired" style="color:var(--red)">-</div><div class="stat-label">Expired</div></div>
          <div class="stat-card"><div class="stat-num" id="st-bound" style="color:#ffcc44">-</div><div class="stat-label">Terhubung</div></div>
        </div>

        <!-- Aksi -->
        <div class="dash-actions">
          <button class="btn btn-primary" onclick="toggleGenForm()">➕ Generate Key</button>
          <button class="btn btn-ghost" onclick="loadKeys()">🔄 Refresh</button>
        </div>

        <!-- Form generate -->
        <div id="genForm" style="display:none;background:rgba(96,96,255,0.06);border:1px solid rgba(96,96,255,0.2);border-radius:12px;padding:16px;margin-bottom:16px">
          <div style="font-size:13px;color:var(--text);margin-bottom:10px;font-weight:600">Generate Key Baru</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <div class="input-wrap" style="flex:1;min-width:80px">
              <input type="number" id="genCount" placeholder="Jumlah" value="1" min="1" max="50" style="padding:10px 12px">
            </div>
            <div class="input-wrap" style="flex:1;min-width:80px">
              <input type="number" id="genDays" placeholder="Hari" value="1" min="1" max="30" style="padding:10px 12px">
            </div>
            <button class="btn btn-primary" style="width:auto;padding:10px 20px;flex:1" onclick="doGenKey()">Generate</button>
          </div>
          <div id="gen-result" style="margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--green);line-height:1.8"></div>
        </div>

        <!-- Tabel key -->
        <div class="key-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Key</th><th>Status</th><th>HWID</th><th>Expire</th><th>Aksi</th>
              </tr>
            </thead>
            <tbody id="keyTableBody"></tbody>
          </table>
        </div>
        <div id="dash-status" class="status" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = location.origin;

// ── Router ─────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

if (location.pathname === '/dashboard') {
  showPage('pageDash');
} else {
  showPage('pageGetkey');
  initGetKey();
}

// ══════════════════════════════════════════
// GET KEY PAGE
// ══════════════════════════════════════════
function initGetKey() {
  // Ambil HWID dari URL param (dikirim dari Lua script)
  const params = new URLSearchParams(location.search);
  const hwid   = params.get('hwid') || generateBrowserHwid();
  window._hwid = hwid;
  document.getElementById('hwidDisplay').textContent = hwid.substring(0, 24) + '...';
}

// Fallback HWID kalau dibuka manual di browser
function generateBrowserHwid() {
  let id = localStorage.getItem('vh_browser_hwid');
  if (!id) {
    id = 'WEB-' + Math.random().toString(36).substring(2,8).toUpperCase()
              + '-' + Math.random().toString(36).substring(2,8).toUpperCase();
    try { localStorage.setItem('vh_browser_hwid', id); } catch(e){}
  }
  return id;
}

function setGkStatus(msg, type='') {
  const s = document.getElementById('gk-status');
  s.textContent = msg; s.className = 'status ' + type;
}

async function doGetKey() {
  const hwid = window._hwid;
  const btn  = document.getElementById('btnGetKey');
  btn.disabled = true;
  btn.textContent = '⏳ Memproses...';
  setGkStatus('Mengambil key...');

  try {
    const res  = await fetch(`${API}/api/getkey?hwid=${encodeURIComponent(hwid)}`);
    const data = await res.json();

    if (data.key) {
      document.getElementById('keyText').textContent = data.key;
      const exp = new Date(data.expires);
      document.getElementById('keyExpires').textContent =
        `Berlaku hingga: ${exp.toLocaleString('id-ID')}`;
      document.getElementById('keyResult').style.display = 'block';
      btn.style.display = 'none';
      setGkStatus(data.reused ? '✓ Key kamu masih aktif, digunakan kembali' : '✓ Key baru berhasil dibuat!', 'ok');
    } else {
      setGkStatus(data.error || 'Gagal ambil key, coba lagi', 'err');
      btn.disabled = false;
      btn.textContent = '⚡ Ambil Key Sekarang';
    }
  } catch(e) {
    setGkStatus('Koneksi error, coba lagi', 'err');
    btn.disabled = false;
    btn.textContent = '⚡ Ambil Key Sekarang';
  }
}

function copyKey() {
  const key = document.getElementById('keyText').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<span>✓</span> Tersalin!';
    setTimeout(() => { btn.innerHTML = '<span>📋</span> Salin Key'; }, 2000);
  });
}

// ══════════════════════════════════════════
// DASHBOARD PAGE
// ══════════════════════════════════════════
let _secret = '';

function setDashStatus(msg, type='') {
  const s = document.getElementById('dash-status');
  if (s) { s.textContent = msg; s.className = 'status ' + type; }
}

async function doLogin() {
  const secret = document.getElementById('secretInput').value.trim();
  if (!secret) return;
  const s = document.getElementById('login-status');
  s.textContent = 'Memeriksa...'; s.className = 'status';
  try {
    const res  = await fetch(`${API}/api/dashboard?secret=${encodeURIComponent(secret)}&action=list`);
    const data = await res.json();
    if (data.stats) {
      _secret = secret;
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dashMain').style.display = 'block';
      renderStats(data.stats);
      renderTable(data.keys);
    } else {
      s.textContent = '❌ Secret salah'; s.className = 'status err';
    }
  } catch(e) {
    s.textContent = '❌ Koneksi error'; s.className = 'status err';
  }
}

function doLogout() {
  _secret = '';
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('dashMain').style.display = 'none';
  document.getElementById('secretInput').value = '';
}

async function loadKeys() {
  try {
    const res  = await fetch(`${API}/api/dashboard?secret=${encodeURIComponent(_secret)}&action=list`);
    const data = await res.json();
    renderStats(data.stats); renderTable(data.keys);
    setDashStatus('✓ Data diperbarui', 'ok');
    setTimeout(() => setDashStatus(''), 2000);
  } catch(e) { setDashStatus('❌ Gagal refresh', 'err'); }
}

function renderStats(s) {
  document.getElementById('st-total').textContent   = s.total;
  document.getElementById('st-active').textContent  = s.active;
  document.getElementById('st-expired').textContent = s.expired;
  document.getElementById('st-bound').textContent   = s.bound;
}

function renderTable(keys) {
  const tbody = document.getElementById('keyTableBody');
  if (!keys || keys.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">Belum ada key</td></tr>';
    return;
  }
  tbody.innerHTML = keys.map(k => `
    <tr>
      <td style="color:var(--green);font-size:11px">${k.key}</td>
      <td><span class="badge ${k.expired ? 'badge-red' : 'badge-green'}">${k.expired ? 'Expired' : 'Aktif'}</span></td>
      <td style="color:var(--muted);font-size:10px">${k.hwid ? k.hwid.substring(0,16)+'...' : '<span class="badge badge-muted">Bebas</span>'}</td>
      <td style="color:var(--muted)">${k.expires ? k.expires.substring(0,10) : '-'}</td>
      <td>
        ${k.hwid ? `<button class="act-btn" onclick="resetHwid('${k.key}')">Reset HWID</button>` : ''}
        <button class="act-btn del" onclick="deleteKey('${k.key}')">Hapus</button>
      </td>
    </tr>
  `).join('');
}

function toggleGenForm() {
  const f = document.getElementById('genForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function doGenKey() {
  const count = parseInt(document.getElementById('genCount').value) || 1;
  const days  = parseInt(document.getElementById('genDays').value)  || 1;
  document.getElementById('gen-result').textContent = 'Generating...';
  try {
    const res  = await fetch(`${API}/api/dashboard`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: _secret, action: 'genkey', count, expireDays: days })
    });
    const data = await res.json();
    if (data.keys) {
      document.getElementById('gen-result').innerHTML =
        '✓ Key berhasil dibuat:<br>' + data.keys.join('<br>');
      loadKeys();
    }
  } catch(e) {
    document.getElementById('gen-result').textContent = '❌ Gagal generate';
  }
}

async function deleteKey(key) {
  if (!confirm(`Hapus key ${key}?`)) return;
  const res  = await fetch(`${API}/api/dashboard`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: _secret, action: 'delete', key })
  });
  const data = await res.json();
  if (data.success) { setDashStatus('✓ Key dihapus', 'ok'); loadKeys(); }
  else setDashStatus('❌ ' + (data.error || 'Gagal'), 'err');
}

async function resetHwid(key) {
  const res  = await fetch(`${API}/api/dashboard`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: _secret, action: 'resethwid', key })
  });
  const data = await res.json();
  if (data.success) { setDashStatus('✓ HWID direset', 'ok'); loadKeys(); }
  else setDashStatus('❌ ' + (data.error || 'Gagal'), 'err');
}
</script>
</body>
</html>
